[build]
builder = "railpack"
# Only rebuild when backend code changes (not frontend)
watchPatterns = ["backend/**", "requirements.txt", "pyproject.toml", "uv.lock", "railway.toml"]

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8080}"
healthcheckPath = "/api/health"
# Cloud boot does create_all + reference-data seeding before binding the port
# (~10-15s); 30s left no margin and lost the race once (tilt_ui-7ba). Slow
# idempotent repairs (schema reconcile, recipe backfills) run off this path.
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
